<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Windows hero illustration</title>
  <desc id="desc">Abstract window panes over a warm gradient sky.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d4e9d"/>
      <stop offset="50%" stop-color="#4b8fc9"/>
      <stop offset="100%" stop-color="#f2b36c"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g fill="rgba(255,255,255,0.82)">
    <rect x="260" y="170" width="250" height="210" rx="18"/>
    <rect x="540" y="170" width="250" height="210" rx="18"/>
    <rect x="260" y="410" width="250" height="210" rx="18"/>
    <rect x="540" y="410" width="250" height="210" rx="18"/>
  </g>
  <circle cx="1230" cy="230" r="120" fill="rgba(255,255,255,0.16)"/>
  <circle cx="1340" cy="620" r="170" fill="rgba(255,255,255,0.12)"/>
