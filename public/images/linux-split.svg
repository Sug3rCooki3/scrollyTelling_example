<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1200" role="img" aria-labelledby="title desc">
  <title id="title">Linux split illustration</title>
  <desc id="desc">Abstract stacked server racks and package boxes.</desc>
  <rect width="1000" height="1200" fill="#111827"/>
  <g fill="#1f2937" stroke="#60a5fa" stroke-width="8">
    <rect x="150" y="140" width="700" height="180" rx="24"/>
    <rect x="150" y="380" width="700" height="180" rx="24"/>
    <rect x="150" y="620" width="700" height="180" rx="24"/>
  </g>
  <g fill="#93c5fd">
    <circle cx="240" cy="230" r="18"/>
    <circle cx="240" cy="470" r="18"/>
    <circle cx="240" cy="710" r="18"/>
  </g>
  <g fill="#34d399" opacity="0.8">
    <rect x="240" y="920" width="160" height="120" rx="20"/>
    <rect x="430" y="860" width="160" height="180" rx="20"/>
    <rect x="620" y="960" width="160" height="80" rx="20"/>
  </g>
</svg>
